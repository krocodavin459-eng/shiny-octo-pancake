            padding: 0;

            --tertiary: #f59e0b;
            --success: #10b981;

            --bg-light: #f9fafb;

            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body.light-mode {
            --current-text: var(--text-dark);
            --current-bg: var(--bg-light);
            --current-card: var(--card-light);
        }

        body.dark-mode {
            --current-text: var(--text-light);
            --current-bg: var(--bg-dark);
            --current-card: var(--card-dark);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;

            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: var(--current-text);
            transition: color 0.3s ease, background 0.3s ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 25%, #581c87 50%, #0c4a6e 75%, #0a3f5e 100%);
            background-size: 400% 400%;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-toggle {
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 2px;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .theme-toggle-circle {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        .theme-toggle.dark .theme-toggle-circle {
            transform: translateX(22px);
        }

        /* Main Container */
        .container {
            max-width: 700px;
            width: 100%;
            margin-top: 80px;
            animation: fade-in 0.6s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Counter */
        .counter {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--current-text);
            margin-bottom: 20px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        /* Fact Card */
        .fact-card {
            background: var(--current-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            animation: slide-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fact-emoji {
            font-size: 64px;
            margin-bottom: 15px;
            animation: bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .fact-category {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .fact-text {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.6;
            color: var(--current-text);
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        /* Button Container */
        .button-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 30px;
            animation: fade-in 0.5s ease-out 0.3s both;
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        /* Buttons */
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: var(--current-text);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* Timer */
        .timer {
            font-size: 12px;
            color: var(--current-text);
            opacity: 0.6;
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .timer-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: slide-in-right 0.3s ease;
            z-index: 2000;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slide-in-right {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header {
                padding: 12px 20px;
            }

            .header-title {
                font-size: 20px;
            }

            .container {
                margin-top: 70px;
            }

            .fact-card {
                padding: 35px 25px;
                min-height: 250px;
                border-radius: 20px;
            }

            .fact-emoji {
                font-size: 48px;
            }

            .fact-text {
                font-size: 18px;
            }

            button {
                padding: 12px 20px;
                font-size: 13px;
                border-radius: 10px;
            }

            .button-row {
                grid-template-columns: 1fr 1fr;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
            }
        }

        @media (max-width: 480px) {
            .fact-card {

                min-height: 220px;
            }

            .fact-emoji {
                font-size: 40px;
                margin-bottom: 10px;
            }

            .fact-text {
                font-size: 16px;
                line-height: 1.5;
            }

            .button-row {
                grid-template-columns: 1fr;
            }

            .button-container {
                gap: 10px;
                margin-top: 20px;
            }
        }
    </style>
</head>

            return factsDatabase[randomIndex];

        // ===== Display Fact =====

            const fact = getRandomFact();

                factCategory.textContent = fact.category;
                factCard.style.animation = '';

            updateCounter();

            // Reset timer if auto-play is enabled

                resetAutoPlayTimer();
            }

            }).catch(() => {
                showToast('Failed to copy fact');
            });
        }

            const shareData = {
                title: 'Fun Fact',
                text: `${factEmoji.textContent} [${category}] ${text}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(() => {
                    // Share API not available
                    showToast('Share not supported on this device');
                });
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareData.text);
                showToast('🔗 Fact link copied! Share manually.');

                resetAutoPlayTimer();
            } else {
                autoPlayBtn.textContent = '⏱️ Auto (Off)';
                autoPlayBtn.style.background = '';
                autoPlayBtn.style.color = '';
                autoPlayBtn.classList.add('btn-secondary');
                autoPlayBtn.classList.remove('btn-primary');
                timerSection.style.display = 'none';
                clearInterval(autoPlayInterval);
                clearInterval(timerInterval);
            }
        }

        // ===== Reset Auto-Play Timer =====
        function resetAutoPlayTimer() {
            clearInterval(autoPlayInterval);
            clearInterval(timerInterval);
            remainingSeconds = 30;

            autoPlayInterval = setInterval(() => {
                displayRandomFact();
                remainingSeconds = 30;
                updateTimerUI();
            }, 30000);

            timerInterval = setInterval(() => {
                remainingSeconds--;
                if (remainingSeconds < 0) remainingSeconds = 0;
                updateTimerUI();
            }, 1000);

            updateTimerUI();
        }

        // ===== Update Timer UI =====
        function updateTimerUI() {
            timerCount.textContent = remainingSeconds;
            const percentage = (remainingSeconds / 30) * 100;
            timerFill.style.width = percentage + '%';
        }

        // ===== Update Counter =====
        function updateCounter() {
            counterElement.textContent = sessionViewCount;
        }

        // ===== Show Toast Notification =====
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slide-in-right 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // ===== Theme Toggle =====
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                document.body.classList.remove('light-mode');
            } else {
                document.body.classList.add('light-mode');
                document.body.classList.remove('dark-mode');
            }
            
            updateThemeToggle();
        }

        // ===== Update Theme Toggle Button =====
        function updateThemeToggle() {
            const circle = themeToggle.querySelector('.theme-toggle-circle');
            if (isDarkMode) {
                themeToggle.classList.add('dark');
                circle.textContent = '🌙';
            } else {
                themeToggle.classList.remove('dark');
                circle.textContent = '☀️';
            }
        }

        // ===== Keyboard Shortcuts =====
        function handleKeyPress(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                displayRandomFact();
            }
            if (e.code === 'KeyC' && e.ctrlKey) {
                e.preventDefault();
                copyFactToClipboard();
            }
        }

        // ===== Start Application =====
        init();
    </script>
</body>
</html>
